<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <title>Carrito</title>
</head>

<body>
    <section class="section-navbar">
        <nav class="navbar bg-body-tertiary">

            <div class="container-fluid">
                <a class="navbar-brand">CandyCandy</a>
                <div class="navbar-carrito">
                    <a href="#section-carrito"> 🛒 <span id="badge"> 0 </span></a>
                </div>
                <form class="d-flex" role="search">
                    <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search" />
                    <button class="btn btn-outline-success" type="submit">Search</button>
                </form>
            </div>
        </nav>
    </section>

    <section class="section-cards">
        <div class="card" style="width: 18rem;">
            <div class="card-body">
                <h3 class="data-nombre ">Papa</h3>
                <p class="data-precio">$5000</p>
                <button  class="btn-agregar" data-nombre="papa" data-precio="5000">Agregar</button>
            </div>
        </div>

        <div class="card" style="width: 18rem;">
            <div class="card-body">
                <h3 class="nombre">Arroz</h3>
                <p class="precio">$3000</p>
                <button  class="btn-agregar" data-nombre="arroz" data-precio="3000">Agregar</button>
            </div>
        </div>

        <div class="card" style="width: 18rem;">
            <div class="card-body">
                <h3 class="nombre">Tomate</h3>
                <p class="precio">$6000</p>
                <button  class="btn-agregar" data-nombre="tomate" data-precio="6000">Agregar</button>
            </div>
        </div>

        <div class="card" style="width: 18rem;">
            <div class="card-body">
                <h3 class="nombre">Uva</h3>
                <p class="precio">$50000</p>
                <button  class="btn-agregar" data-nombre="uva" data-precio="50000">Agregar</button>
            </div>
        </div>
    </section>

    <section class="section-carrito" id="section-carrito">
        <div class="container-carrrito">
            <ul id="lista-carrito">
            </ul>
            <span id="total">$0</span>
            <button id="btn-vaciar">Eliminar</button>

        </div>
    </section>

    <script src="app.js"></script>
</body>

</html>
